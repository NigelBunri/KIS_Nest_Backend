name: NestJS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      MONGODB_URI: mongodb://localhost:27017/kis_test
      REDIS_URL: redis://localhost:6379/0
      DJANGO_JWT_SECRET: ci-test-jwt-secret-not-for-production
      DJANGO_INTERNAL_TOKEN: ci-test-internal-token-not-for-production
      DJANGO_INTROSPECT_URL: http://localhost:8000/api/v1/auth/introspect/
      ORIGINS: http://localhost:3000

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint:ci

      - name: Run tests
        run: npm run test:cov

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nestjs-coverage
          path: coverage/
